  async function updateAnalyticsCache(log){
    if(!auth.currentUser){
 alert("Not authenticated");
 return;
}
    if(!auth.currentUser.email.endsWith("@supplylogic.com")){
  return;
}

  const today=new Date().toISOString().slice(0,10);

  const cacheDoc=analyticsCache.doc("daily_"+today);

  await db.runTransaction(async tx=>{

    const snap=await tx.get(cacheDoc);

    let data=snap.exists ? snap.data() : {
      totalLogs:0,
      resolved:0,
      breached:0,
      agents:{},
      dispositions:{}
    };

    data.totalLogs++;

    if(log.status==="Resolved")
      data.resolved++;

    // SLA check (48h rule)
   // do not calculate SLA at write time
// breach should be computed dynamically in analytics

    // Agent leaderboard
    if(!data.agents[log.agent]){
      data.agents[log.agent]={logs:0,resolved:0};
    }

    data.agents[log.agent].logs++;

    if(log.status==="Resolved")
      data.agents[log.agent].resolved++;

    // Disposition stats
   if(log.disposition){
  data.dispositions[log.disposition] =
    (data.dispositions[log.disposition]||0)+1;
}

    tx.set(cacheDoc,data,{merge:true});
  });
}

function loadCompanies() {
  const toolEl = document.getElementById('tool');
  const companySelect = document.getElementById('company');
  const companyOther = document.getElementById('companyOther');

  const tool = toolEl.value;

  companySelect.innerHTML = '<option value="">Select Company</option>';

  // ⭐ If Tool = Other → switch to manual company input
  if(tool === "Other"){
    companySelect.classList.add("hidden");
    companyOther.classList.remove("hidden");

    companyOther.value = "";
    return;
  }

  companySelect.classList.remove("hidden");
  companyOther.classList.add("hidden");

  if (!tool || !companies[tool]) return;

  companies[tool].forEach(c => {
    const o = document.createElement('option');
    o.value = o.textContent = c;
    companySelect.appendChild(o);
  });

/* ================= SAVE LOG ================= */

async function saveLog(){

  if(submissionLock) return;
  submissionLock=true;
  setTimeout(()=>submissionLock=false,3000);

    alert("Not authenticated");
    return;
  }

  const customer=document.getElementById("customer").value.trim();

 alert("Invalid customer name");
 return;
}

  const ref=document.getElementById("refId").value.trim();
  const tool=document.getElementById("tool").value;
  let company = "";

if(tool === "Other"){

}
else{

}

let finalAmReason = amReasonSelect;

if(amReasonSelect === "Other"){

    return;
  }

}
  if(disposition === "Refer to AM"){

  if(!amReason){
    alert("Please select AM Reason");

  }

}
  const amName=document.getElementById("amName").value.trim();
  const dollarAmount=document.getElementById("dollarAmount").value.trim();
  const status=document.getElementById("status").value || "Open";
  const notes=document.getElementById("notes").value.trim();

  const createdDay=new Date().toISOString().slice(0,10);

  const logData={
customer,
customerLower:customer.toLowerCase(),
phone,
ref,
tool,
company,
disposition,
amReason: finalAmReason,
amName,
dollarAmount,
status,
notes,
agent,
createdDay,
created:firebase.firestore.FieldValue.serverTimestamp()
};
  try{

    const docRef=await db.collection("logs").add(logData);

    // ⭐ Update Analytics Cache (NO SCAN REQUIRED)

 "customer",

];

 if(el) el.value="";
});

document.getElementById("notes").value="Concern:\n\nAction Taken:";

  function openEditModal(id){

  editLogId = id;

  });

}
  async function rebuildTodayAnalyticsCache(){

 const today = new Date().toISOString().slice(0,10);

 const snap = await db.collection("logs")
   .where("createdDay","==",today)
   .get();

 let cache = {
   totalLogs:0,
   resolved:0,
   breached:0,
   agents:{},
   dispositions:{}
 };

 snap.forEach(doc=>{
   const log = doc.data();

   cache.totalLogs++;

   if(log.status==="Resolved")
     cache.resolved++;

   if(!cache.agents[log.agent])
     cache.agents[log.agent]={logs:0,resolved:0};

   cache.agents[log.agent].logs++;

   if(log.status==="Resolved")
     cache.agents[log.agent].resolved++;

   if(log.disposition){
     cache.dispositions[log.disposition]=
       (cache.dispositions[log.disposition]||0)+1;
   }

 });

 await db.collection("analytics_cache")
   .doc("daily_"+today)
   .set(cache,{merge:true});
}

STATUS UPDATE SAFE

function updateStatus(){

  if(!auth.currentUser){
 alert("Not authenticated");
 return;
}

  if(!editLogId) return;

  const newStatus =
    document.getElementById("editStatusSelect").value;

  const updateData = {
    status:newStatus,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  };

  if(newStatus === "Resolved"){
  updateData.resolvedAt =
    firebase.firestore.FieldValue.serverTimestamp();
}

if(newStatus === "Follow-up"){
  updateData.followUpAt =
    firebase.firestore.FieldValue.serverTimestamp();
}

  db.collection("logs").doc(editLogId).update(updateData)
  .then(async ()=>{

  showToast("✅ Status updated");

  await rebuildTodayAnalyticsCache();

  closeStatusModal();
  loadLogs();

  editLogId=null;

  }).catch(e=>alert(e.message));
}

  pageStack = [];

/* ================= LOAD LOGS (FIXED PAGINATION) ================= */

function loadLogs(direction = "first") {

  captureFilters();

  if(direction === "first"){
    pageStack = [];
    lastVisibleDoc = null;
    firstVisibleDoc = null;
  }

  const table = document.getElementById('logTable');
  table.innerHTML = '';

 let q = db.collection('logs');

if(activeFilter.search){
  q = q.where('customerLower','>=',activeFilter.search)
       .where('customerLower','<=',activeFilter.search + '\uf8ff')
       .orderBy('customerLower')
       .orderBy('created','desc');
} else {
  q = q.orderBy('created','desc');
}
  // 🔹 Company filter
  if(activeFilter.company){
    q = q.where('company','==',activeFilter.company);
  }

  // 🔹 Status filter
  if(activeFilter.status){
    q = q.where('status','==',activeFilter.status);
  }

  // 🔹 Date filters
  if(activeFilter.startDate){
    q = q.where('createdDay','>=',activeFilter.startDate);
  }

  if(activeFilter.endDate){
    q = q.where('createdDay','<=',activeFilter.endDate);
  }

  q = q.limit(pageSize);

  // 🔹 Next page
  if(direction === "next" && lastVisibleDoc){
    q = q.startAfter(lastVisibleDoc);
  }

  // 🔹 Previous page
  if(direction === "prev" && pageStack.length > 1){
    pageStack.pop();
    const prevDoc = pageStack[pageStack.length - 1];
    q = q.startAt(prevDoc);
  }

  q.get().then(snapshot=>{

    if(snapshot.empty){
      renderPaginationControls();
      return;
    }

    firstVisibleDoc = snapshot.docs[0];
    lastVisibleDoc = snapshot.docs[snapshot.docs.length - 1];

    if(direction !== "prev" && firstVisibleDoc){

 const lastStack = pageStack[pageStack.length-1];

 if(!lastStack || lastStack.id !== firstVisibleDoc.id){
   pageStack.push(firstVisibleDoc);
 }
}
    snapshot.forEach(d=>{

      const l = d.data();

      const created = l.created?.toDate?.() || null;
let slaText = "⏳ Monitoring";
let slaClass = "";

if(created && l.status !== "Resolved"){

  const SLA_HOURS = 48;

  const elapsed = (Date.now() - created.getTime()) / 36e5;
  const remaining = SLA_HOURS - elapsed;

  if(remaining <= 0){

    const over = Math.abs(remaining);
    const h = Math.floor(over);
    const m = Math.floor((over-h)*60);

    slaText = `🔥 BREACHED (${h}h ${m}m overdue)`;
    slaClass = "sla-breached";

  }
  else if(remaining <= 8){

    const h = Math.floor(remaining);
    const m = Math.floor((remaining-h)*60);

    slaText = `⚠️ Follow up in ${h}h ${m}m`;
    slaClass = "sla-warning";

  }
  else {
    // Hide noise for safe logs
    slaText = `✅ SLA Safe`;
    slaClass = "sla-ok";
  }
}

    
      if (l.status === 'Resolved') {
        slaText = '✅ Resolved';
        slaClass = 'sla-ok';
      }

      const createdText = created?.toLocaleString() || "";

      const tr = document.createElement('tr');

      if (slaClass === 'sla-breached') {
        tr.style.backgroundColor = '#fdecea';
      }

      tr.innerHTML = `
  <td>${l.customer || ""}</td>
  <td>${l.phone || ""}</td>
  <td>${l.company || ""}</td>
  <td>${l.disposition || ""}</td>
  <td>${l.status || ""}</td>
  <td>${l.amName || ""}</td>
  <td>${l.dollarAmount || ""}</td>
  <td>${l.agent || ""}</td>
  <td>${createdText}</td>
  <td>
    ${l.resolvedAt?.toDate?.().toLocaleString() || "—"}
  </td>
  <td><span class="${slaClass}">${slaText}</span></td>
  <td>
  <button onclick="viewNotes('${d.id}')">View</button>

  ${isAdmin 
    ? `<button onclick="openFullEditModal('${d.id}')">Edit</button>`
    : l.status !== "Resolved"
      ? `<button onclick="openEditModal('${d.id}')">Edit Status</button>`
      : ''
  }

  ${isAdmin
    ? `<button onclick="deleteLog('${d.id}')">Delete</button>`
    : ''
  }
</td>
`;

      table.appendChild(tr);
    });

    renderPaginationControls();
  });
}

  controls.innerHTML = `

      ${pageStack.length <= 1 ? 'disabled' : ''}>
      ⬅ Prev
    </button>

    <button onclick="loadLogs('next')">
      Next ➡
    </button>
  `;
}

/* ================= NOTES ================= */

function viewNotes(id){

  if(!id) return;

  db.collection("logs").doc(id).get().then(doc=>{

    if(!doc.exists) return;

    const notes = doc.data().notes || "";

    const [concernPart, actionPart] = notes.split("Action Taken:");

    modalText.innerHTML = `
    <b>Concern</b><br><br>
    ${concernPart?.replace("Concern:","").trim() || ""}
    <br><br>
    <b>Action Taken</b><br><br>
    ${actionPart?.trim() || ""}
    `;

    notesModal.style.display="flex";

  });

}

  function openFullEditModal(id){
  editLogId = id;

  db.collection("logs").doc(id).get().then(doc=>{
    if(!doc.exists) return;

    const l = doc.data();

    editCustomer.value = l.customer || "";
    editPhone.value = l.phone || "";
    editRef.value = l.ref || "";
    editCompany.value = l.company || "";
    editDisposition.value = l.disposition || "";
    editFullStatus.value = l.status || "Open";
    editNotes.value = l.notes || "";

    fullEditModal.style.display = "flex";
  });
}

function closeFullEditModal(){
  fullEditModal.style.display = "none";
}

function updateFullLog(){
 if(!auth.currentUser){
    alert("Not authenticated");
    return;
  }

  if(!editLogId) return;
const newCustomer = editCustomer.value.trim();
  db.collection("logs").doc(editLogId).update({
    customer: newCustomer,
    customerLower: newCustomer.toLowerCase(),
    phone: editPhone.value.trim(),
    ref: editRef.value.trim(),
    company: editCompany.value.trim(),
    disposition: editDisposition.value.trim(),
    status: editFullStatus.value,
    notes: editNotes.value.trim(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  })
  .then(async ()=>{

    showToast("✅ Log fully updated");

    await rebuildTodayAnalyticsCache();

    closeFullEditModal();
    loadLogs();

    editLogId = null;

  })
  .catch(e=>alert(e.message));
}
  
/* =========================================================
CSV EXPORT — FULLY SAFE VERSION
=========================================================*/
async function exportCSV(){

  captureFilters();

  let q = db.collection("logs")
            .orderBy("created","desc");

  if(activeFilter.company)
    q = q.where('company','==',activeFilter.company);

  if(activeFilter.status)
    q = q.where('status','==',activeFilter.status);

  if(activeFilter.startDate)
    q = q.where('createdDay','>=',activeFilter.startDate);

  if(activeFilter.endDate)
    q = q.where('createdDay','<=',activeFilter.endDate);

  let csvBuffer = [];

  const headers = [
"Customer",
"Phone",
"Refid",
"Company",
"Disposition",
"AM Name",
"Dollar Amount",
"Status",
"Agent",
"Created Time",
"Resolved Time",
"Resolution Hours",
"SLA Target Hours",
"SLA Status",
"Breach Hours"
];
  csvBuffer.push(headers.join(","));

  let lastDoc = null;

  function escapeCSV(value){
    if(!value) return '""';
    let str = value.toString();
    str = str.replace(/\r?\n|\r/g," ");
    str = str.replace(/"/g,'""');
    return `"${str}"`;
  }

  while(true){

    let query = q;

    if(lastDoc){
      query = query.startAfter(lastDoc);
    }

    const snap = await query.get();

    if(snap.empty) break;

    snap.forEach(doc=>{
      const SLA_HOURS = 48;

  const l = doc.data();

  const created = l.created?.toDate?.() || null;
  const resolved = l.resolvedAt?.toDate?.() || null;

  let resolutionHours = "";
  let breachHours = "";
  let slaStatus = "Open";

  if(created && resolved){

    const diff = (resolved - created) / 36e5;
    resolutionHours = diff.toFixed(2);

    if(diff > SLA_HOURS){
      slaStatus = "BREACHED";
      breachHours = (diff - SLA_HOURS).toFixed(2);
    }else{
      slaStatus = "SAFE";
      breachHours = 0;
    }

  }

  const createdText = created ? created.toLocaleString() : "";
  const resolvedText = resolved ? resolved.toLocaleString() : "";

  const row = [
escapeCSV(l.customer),
escapeCSV(l.phone),
escapeCSV(l.ref || ""),          // ✅ REF ID FIXED
escapeCSV(l.company),
escapeCSV(l.disposition),
escapeCSV(l.amName || ""),
escapeCSV(l.dollarAmount || ""),
escapeCSV(l.status),
escapeCSV(l.agent),
escapeCSV(created?.toLocaleString() || ""),
escapeCSV(resolved?.toLocaleString() || ""),
escapeCSV(resolutionHours),
escapeCSV(SLA_HOURS),
escapeCSV(slaStatus),
escapeCSV(breachHours)
];;

csvBuffer.push(row.join(","));

});


    lastDoc = snap.docs[snap.docs.length-1];
  }

  const blob = new Blob(
    [csvBuffer.join("\n")],
    {type:"text/csv;charset=utf-8;"}
  );

  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download =
    `call_logs_stream_${new Date().toISOString().slice(0,10)}.csv`;

  link.click();

  URL.revokeObjectURL(url);

  showToast("📄 Streaming CSV Export Completed");
}

function deleteLog(id){

  if(!auth.currentUser){
    alert("Not authenticated");
    return;
  }

  if(!isAdmin){
    alert("Unauthorized");
    return;
  }

  if(!confirm("Delete this log?")) return;

  db.collection("logs").doc(id).delete().then(async ()=>{

    showToast("🗑️ Log deleted");

    await rebuildTodayAnalyticsCache();

    loadLogs();
  });
}

// ADMIN ANALYTICS
async function loadAdminAnalytics(){

  const start = document.getElementById('adminStartDate').value;
  const end = document.getElementById('adminEndDate').value;
  const analytics = document.getElementById("analytics");

  analytics.innerHTML = "Loading analytics...";

  let dateList = [];

  if(start && end){

    let cur = new Date(start);
    const endDate = new Date(end);

    while(cur <= endDate){
      dateList.push(cur.toISOString().slice(0,10));
      cur.setDate(cur.getDate()+1);
    }

  } else if(start){
    dateList = [start];
  } else {
    dateList = [new Date().toISOString().slice(0,10)];
  }
    if(dateList.length > 10){
  alert("Date range too large. Please select max 10 days.");
  return;
}

  // ===============================
  // SINGLE FIRESTORE SCAN ONLY
  // ===============================

  const logsSnap = await db.collection("logs")
    .where("createdDay","in",dateList)
    .get();

  let totalLogs = 0;
  let resolved = 0;
  let breached = 0;

  let dispositionMap = {};
  let leaderboardMap = {};

  let lifecycleTotal = 0;
  let lifecycleCount = 0;

  const SLA_HOURS = 48;

  logsSnap.forEach(doc=>{

    const l = doc.data();

    totalLogs++;

    if(l.status === "Resolved"){
      resolved++;
    }

    // disposition stats
    if(l.disposition){
      dispositionMap[l.disposition] =
        (dispositionMap[l.disposition]||0)+1;
    }

    // leaderboard aggregation
    if(l.agent){
      if(!leaderboardMap[l.agent]){
        leaderboardMap[l.agent] = {logs:0,resolved:0};
      }

      leaderboardMap[l.agent].logs++;

      if(l.status === "Resolved"){
        leaderboardMap[l.agent].resolved++;
      }
    }

    // SLA breach check + lifecycle

    const created = l.created?.toDate?.();
    const resolvedAt = l.resolvedAt?.toDate?.();

    if(!created) return;

    const endTime = resolvedAt || new Date();
    const lifecycleHours =
      (endTime - created) / 36e5;

    lifecycleTotal += lifecycleHours;
    lifecycleCount++;

    if(l.status !== "Resolved" && lifecycleHours > SLA_HOURS){
      breached++;
    }

  });

  // ===============================
  // Compute Final Metrics
  // ===============================

  const avgLifecycle =
    lifecycleCount > 0
    ? (lifecycleTotal / lifecycleCount).toFixed(2)
    : "0";

  // ===============================
  // Render Leaderboard
  // ===============================

  let lb = `
    <h4>Agent Activity Leaderboard</h4>
    <table>
    <tr>
      <th>Agent</th>
      <th>Logs</th>
      <th>Resolved</th>
      <th>Resolution %</th>
    </tr>
  `;

  Object.entries(leaderboardMap)
    .sort((a,b)=>b[1].logs-a[1].logs)
    .forEach(([agent,v])=>{

      const pct =
        v.logs > 0
        ? ((v.resolved/v.logs)*100).toFixed(1)
        : "0";

      lb += `
        <tr>
          <td>${agent}</td>
          <td>${v.logs}</td>
          <td>${v.resolved}</td>
          <td>${pct}%</td>
        </tr>
      `;
    });

  lb += "</table>";

  // ===============================
  // Final Dashboard Render
  // ===============================

  analytics.innerHTML = `
    <h4>SLA REPORT</h4>
    Total Logs : ${totalLogs}<br>
    Resolved : ${resolved}<br>
    Breached : ${breached}<br>
    Average Resolution Time : ${avgLifecycle} hours

    <h4 style="margin-top:20px">Disposition Stats</h4>
    ${
      Object.entries(dispositionMap)
      .map(d=>`${d[0]} : ${d[1]}`)
      .join("<br>")
    }

    <br><br>
    ${lb}
  `;
}
  
  function calculateLifecycleHours(created, resolvedAt){

  if(!created) return "";

  const end = resolvedAt || new Date();

  return ((end - created)/36e5).toFixed(2);
}
