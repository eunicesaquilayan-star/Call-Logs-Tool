  async function updateAnalyticsCache(log){

  const today=new Date().toISOString().slice(0,10);

  const cacheDoc=analyticsCache.doc("daily_"+today);

  await db.runTransaction(async tx=>{

    const snap=await tx.get(cacheDoc);

    let data=snap.exists ? snap.data() : {
      totalLogs:0,
      resolved:0,
      breached:0,
      agents:{},
      dispositions:{}
    };

    data.totalLogs++;

    if(log.status==="Resolved")
      data.resolved++;

    // SLA check (48h rule)
   // do not calculate SLA at write time
// breach should be computed dynamically in analytics

    // Agent leaderboard
    if(!data.agents[log.agent]){
      data.agents[log.agent]={logs:0,resolved:0};
    }

    data.agents[log.agent].logs++;

    if(log.status==="Resolved")
      data.agents[log.agent].resolved++;

    // Disposition stats
    data.dispositions[log.disposition] =
      (data.dispositions[log.disposition]||0)+1;

    tx.set(cacheDoc,data,{merge:true});
  });
}

/* ================= SAVE LOG ================= */

async function saveLog(){

  if(submissionLock) return;
  submissionLock=true;
  setTimeout(()=>submissionLock=false,1500);

  if(!auth.currentUser){
    alert("Not authenticated");
    return;
  }

  const customer=document.getElementById("customer").value.trim();
  if(!customer){
    alert("Customer required");
    return;
  }

  const phone=document.getElementById("phone").value.trim();
  const ref=document.getElementById("refId").value.trim();
  const tool=document.getElementById("tool").value;
  const company=document.getElementById("company").value;
  const disposition=document.getElementById("disposition").value;
  const amReason=document.getElementById("amReason").value;
  const status=document.getElementById("status").value || "Open";
  const notes=document.getElementById("notes").value.trim();

  const agent=auth.currentUser.email;

  const createdDay=new Date().toISOString().slice(0,10);

  const logData={
    customer,
    customerLower:customer.toLowerCase(),
    phone,
    ref,
    tool,
    company,
    disposition,
    amReason,
    status,
    notes,
    agent,
    createdDay,
    created:firebase.firestore.FieldValue.serverTimestamp()
  };

  try{

    const docRef=await db.collection("logs").add(logData);

    // ⭐ Update Analytics Cache (NO SCAN REQUIRED)

    await updateAnalyticsCache(logData);

    document.getElementById("customer").value="";
    document.getElementById("phone").value="";
    document.getElementById("refId").value="";
    document.getElementById("notes").value="Concern:\n\nAction Taken:";

    showToast("✅ Log saved");

    loadLogs();

  }catch(e){
    alert(e.message);
  }
}
  /* =========================================================
STATUS UPDATE SAFE
=========================================================*/
function updateStatus(){

  if(!editLogId) return;

  const newStatus =
    document.getElementById("editStatusSelect").value;

  const updateData = {
    status:newStatus,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  };

  if(newStatus === "Resolved"){
    updateData.resolvedAt =
      firebase.firestore.FieldValue.serverTimestamp();
  }

  db.collection("logs").doc(editLogId).update(updateData)
  .then(()=>{

    showToast("✅ Status updated");

    closeStatusModal();
    loadLogs();

    editLogId=null;

  }).catch(e=>alert(e.message));
}
  function loadAgentStats(){

  const day = document.getElementById('agentDay').value;
  if(!day) return alert('Select a date');

  const resultBox = document.getElementById('agentStatsResult');
  resultBox.innerHTML = "Loading...";

  const agentEmail = auth.currentUser?.email || "";

  db.collection('logs')
    .where('agent','==', agentEmail)
    .where('createdDay','==', day)
    .get()
    .then(snapshot=>{

      let total = 0;
      let open = 0;
      let resolved = 0;
      let sameDayResolved = 0;

      snapshot.forEach(doc=>{
        const data = doc.data();
        total++;

        // Status count
        if(data.status === "Resolved"){
          resolved++;
        } else {
          open++;
        }

        // Same day resolution check
        if(data.created?.toDate){

          const createdDate = data.created
            .toDate()
            .toISOString()
            .slice(0,10);

          if(createdDate === day && data.status === "Resolved"){
            sameDayResolved++;
          }
        }

      });

      resultBox.innerHTML = `
        <div style="background:#f4f6f9;padding:15px;border-radius:8px">
          <h3>Agent Daily Stats (${day})</h3>
          <p><b>Total Logs:</b> ${total}</p>
          <p><b>Open:</b> ${open}</p>
          <p><b>Resolved:</b> ${resolved}</p>
          <p><b>Resolved Same Day:</b> ${sameDayResolved}</p>
        </div>
      `;

    })
    .catch(e=>{
      console.error(e);
      resultBox.innerHTML = "Error loading stats";
    });
}

  /* ================= GLOBAL FILTER STATE ================= */

let activeFilter = {
  company: "",
  startDate: "",
  endDate: "",
  search: "",
  status: ""
};

/* ================= FILTER CAPTURE ================= */

function captureFilters(){
  activeFilter.company =
    document.getElementById("filterCompany")?.value || "";

  activeFilter.startDate =
    document.getElementById("filterStartDate")?.value || "";

  activeFilter.endDate =
    document.getElementById("filterEndDate")?.value || "";

  activeFilter.search =
    document.getElementById("searchCustomer")?.value
      ?.trim().toLowerCase() || "";
  activeFilter.status =
  document.getElementById("filterStatus")?.value || "";
}

function applyFilters(){
  pageStack = [];
  lastVisibleDoc = null;
  firstVisibleDoc = null;

  captureFilters();
  loadLogs("first");
}

/* ================= LOAD LOGS (FIXED PAGINATION) ================= */

function loadLogs(direction = "first") {

  captureFilters();

  if(direction === "first"){
    pageStack = [];
    lastVisibleDoc = null;
    firstVisibleDoc = null;
  }

  const table = document.getElementById('logTable');
  table.innerHTML = '';

  let q = db.collection('logs')
            .orderBy('created','desc');

  // 🔹 Company filter
  if(activeFilter.company){
    q = q.where('company','==',activeFilter.company);
  }

  // 🔹 Status filter
  if(activeFilter.status){
    q = q.where('status','==',activeFilter.status);
  }

  // 🔹 Date filters
  if(activeFilter.startDate){
    q = q.where('createdDay','>=',activeFilter.startDate);
  }

  if(activeFilter.endDate){
    q = q.where('createdDay','<=',activeFilter.endDate);
  }

  // 🔹 Search (prefix search only)
  if(activeFilter.search){
  q = q.where('customerLower','>=',activeFilter.search)
       .where('customerLower','<=',activeFilter.search + '\uf8ff');
  }

  q = q.limit(pageSize);

  // 🔹 Next page
  if(direction === "next" && lastVisibleDoc){
    q = q.startAfter(lastVisibleDoc);
  }

  // 🔹 Previous page
  if(direction === "prev" && pageStack.length > 1){
    pageStack.pop();
    const prevDoc = pageStack[pageStack.length - 1];
    q = q.startAt(prevDoc);
  }

  q.get().then(snapshot=>{

    if(snapshot.empty){
      renderPaginationControls();
      return;
    }

    firstVisibleDoc = snapshot.docs[0];
    lastVisibleDoc = snapshot.docs[snapshot.docs.length - 1];

    if(direction !== "prev"){
      pageStack.push(firstVisibleDoc);
    }

    snapshot.forEach(d=>{

      const l = d.data();

      const created = l.created?.toDate?.() || null;
      let slaText = '—';
      let slaClass = '';

      if (created && l.status !== 'Resolved') {

        const SLA_HOURS = 48;
        const elapsedMs = Date.now() - created.getTime();
        const elapsedHours = elapsedMs / 36e5;
        const remainingHours = SLA_HOURS - elapsedHours;

        if (remainingHours <= 0) {
          const over = Math.abs(remainingHours);
          const h = Math.floor(over);
          const m = Math.floor((over - h) * 60);
          slaText = `❌ Breached by ${h}h ${m}m`;
          slaClass = 'sla-breached';
        }
        else {
          const h = Math.floor(remainingHours);
          const m = Math.floor((remainingHours - h) * 60);

          if (remainingHours <= 8) {
            slaText = `⚠️ ${h}h ${m}m remaining`;
            slaClass = 'sla-warning';
          } else {
            slaText = `⏳ ${h}h ${m}m remaining`;
            slaClass = 'sla-ok';
          }
        }
      }

      if (l.status === 'Resolved') {
        slaText = '✅ Resolved';
        slaClass = 'sla-ok';
      }

      const createdText =
        l.created?.toDate?.().toLocaleString() || "";

      const tr = document.createElement('tr');

      if (slaClass === 'sla-breached') {
        tr.style.backgroundColor = '#fdecea';
      }

      tr.innerHTML = `
        <td>${l.customer || ""}</td>
        <td>${l.phone || ""}</td>
        <td>${l.company || ""}</td>
        <td>${l.disposition || ""}</td>
        <td>${l.status || ""}</td>
        <td>${l.agent || ""}</td>
        <td>${createdText}</td>
        <td>
        ${l.resolvedAt?.toDate?.().toLocaleString() || "—"}
        </td>
        <td><span class="${slaClass}">${slaText}</span></td>
        <td>
          <button onclick="viewNotes('${d.id}')">View</button>
          ${isAdmin 
            ? `<button onclick="openFullEditModal('${d.id}')">Edit</button>`
            : l.status !== "Resolved"
              ? `<button onclick="openEditModal('${d.id}')">Edit Status</button>`
              : ''
          }
          ${isAdmin
            ? `<button onclick="deleteLog('${d.id}')">Delete</button>`
            : ''
          }
        </td>
      `;

      table.appendChild(tr);
    });

    renderPaginationControls();
  });
}

function renderPaginationControls(){

  const controls = document.getElementById('paginationControls');

  controls.innerHTML = `
    <button onclick="loadLogs('prev')" 
      ${pageStack.length <= 1 ? 'disabled' : ''}>
      ⬅ Prev
    </button>

    <button onclick="loadLogs('next')">
      Next ➡
    </button>
  `;
}

    phone: editPhone.value.trim(),
    ref: editRef.value.trim(),

/* =========================================================
CSV EXPORT — FULLY SAFE VERSION
=========================================================*/
async function exportCSV(){

  captureFilters();

  let pageSize = 500;
  let q = db.collection("logs")
            .orderBy("created","desc")
            .limit(pageSize);

  if(activeFilter.company)
    q = q.where('company','==',activeFilter.company);

  if(activeFilter.status)
    q = q.where('status','==',activeFilter.status);

  if(activeFilter.startDate)
    q = q.where('createdDay','>=',activeFilter.startDate);

  if(activeFilter.endDate)
    q = q.where('createdDay','<=',activeFilter.endDate);

  let csvBuffer = [];

  const headers = [
    "Customer","Phone","Company","Disposition",
    "Status","Agent","Date","Notes",
    "Log Created Time",
    "Resolved Time",
    "Lifecycle Hours"
  ];

  csvBuffer.push(headers.join(","));

  let lastDoc = null;

  function escapeCSV(value){
    if(!value) return '""';
    let str = value.toString();
    str = str.replace(/\r?\n|\r/g," ");
    str = str.replace(/"/g,'""');
    return `"${str}"`;
  }

  while(true){

    let query = q;

    if(lastDoc){
      query = query.startAfter(lastDoc);
    }

    const snap = await query.get();

    if(snap.empty) break;

    snap.forEach(doc=>{

      const l = doc.data();

      const created = l.created?.toDate?.() || null;

      const resolvedTime = l.resolvedAt?.toDate?.() || null;

      let lifecycleHours = "";

      if(created && resolvedTime){
        lifecycleHours =
          ((resolvedTime - created)/36e5).toFixed(2);
      }
     if(csvBuffer.length > 50000){
  alert("Export size too large");
  return;
}

      csvBuffer.push([
        escapeCSV(l.customer),
        escapeCSV(l.phone),
        escapeCSV(l.company),
        escapeCSV(l.disposition),
        escapeCSV(l.status),
        escapeCSV(l.agent),
        escapeCSV(l.created?.toDate?.().toLocaleString()),
        escapeCSV(resolvedTime?.toLocaleString()),
        escapeCSV(lifecycleHours)
      ].join(","));

    });

    lastDoc = snap.docs[snap.docs.length-1];
  }

  const blob = new Blob(
    [csvBuffer.join("\n")],
    {type:"text/csv;charset=utf-8;"}
  );

  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download =
    `call_logs_stream_${new Date().toISOString().slice(0,10)}.csv`;

  link.click();

  URL.revokeObjectURL(url);

  showToast("📄 Streaming CSV Export Completed");
}

// ADMIN ANALYTICS
async function loadAdminAnalytics(){

  const start = document.getElementById('adminStartDate').value;
  const end = document.getElementById('adminEndDate').value;
  const analytics = document.getElementById("analytics");

  analytics.innerHTML = "Loading analytics...";

  let dateList = [];

  if(start && end){

    let cur = new Date(start);
    const endDate = new Date(end);

    while(cur <= endDate){
      dateList.push(cur.toISOString().slice(0,10));
      cur.setDate(cur.getDate()+1);
    }

  } else if(start){
    dateList = [start];
  } else {
    dateList = [new Date().toISOString().slice(0,10)];
  }
    if(dateList.length > 10){
  alert("Date range too large. Please select max 10 days.");
  return;
}

  // ===============================
  // SINGLE FIRESTORE SCAN ONLY
  // ===============================

  const logsSnap = await db.collection("logs")
    .where("createdDay","in",dateList)
    .get();

  let totalLogs = 0;
  let resolved = 0;
  let breached = 0;

  let dispositionMap = {};
  let leaderboardMap = {};

  let lifecycleTotal = 0;
  let lifecycleCount = 0;

  const SLA_HOURS = 48;

  logsSnap.forEach(doc=>{

    const l = doc.data();

    totalLogs++;

    if(l.status === "Resolved"){
      resolved++;
    }

    // disposition stats
    if(l.disposition){
      dispositionMap[l.disposition] =
        (dispositionMap[l.disposition]||0)+1;
    }

    // leaderboard aggregation
    if(l.agent){
      if(!leaderboardMap[l.agent]){
        leaderboardMap[l.agent] = {logs:0,resolved:0};
      }

      leaderboardMap[l.agent].logs++;

      if(l.status === "Resolved"){
        leaderboardMap[l.agent].resolved++;
      }
    }

    // SLA breach check + lifecycle

    const created = l.created?.toDate?.();
    const resolvedAt = l.resolvedAt?.toDate?.();

    if(!created) return;

    const endTime = resolvedAt || new Date();
    const lifecycleHours =
      (endTime - created) / 36e5;

    lifecycleTotal += lifecycleHours;
    lifecycleCount++;

    if(l.status !== "Resolved" && lifecycleHours > SLA_HOURS){
      breached++;
    }

  });

  // ===============================
  // Compute Final Metrics
  // ===============================

  const avgLifecycle =
    lifecycleCount > 0
    ? (lifecycleTotal / lifecycleCount).toFixed(2)
    : "0";

  // ===============================
  // Render Leaderboard
  // ===============================

  let lb = `
    <h4>Agent Activity Leaderboard</h4>
    <table>
    <tr>
      <th>Agent</th>
      <th>Logs</th>
      <th>Resolved</th>
      <th>Resolution %</th>
    </tr>
  `;

  Object.entries(leaderboardMap)
    .sort((a,b)=>b[1].logs-a[1].logs)
    .forEach(([agent,v])=>{

      const pct =
        v.logs > 0
        ? ((v.resolved/v.logs)*100).toFixed(1)
        : "0";

      lb += `
        <tr>
          <td>${agent}</td>
          <td>${v.logs}</td>
          <td>${v.resolved}</td>
          <td>${pct}%</td>
        </tr>
      `;
    });

  lb += "</table>";

  // ===============================
  // Final Dashboard Render
  // ===============================

  analytics.innerHTML = `
    <h4>SLA REPORT</h4>
    Total Logs : ${totalLogs}<br>
    Resolved : ${resolved}<br>
    Breached : ${breached}<br>
    Average Resolution Time : ${avgLifecycle} hours

    <h4 style="margin-top:20px">Disposition Stats</h4>
    ${
      Object.entries(dispositionMap)
      .map(d=>`${d[0]} : ${d[1]}`)
      .join("<br>")
    }

    <br><br>
    ${lb}
  `;
}
  
  function calculateLifecycleHours(created, resolvedAt){

  if(!created) return "";

  const end = resolvedAt || new Date();

  return ((end - created)/36e5).toFixed(2);
}
